name: Garmin Daily Sync

on:
  schedule:
    # Run daily at 07:00 UTC (adjust to your timezone)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install garminconnect requests

      - name: Run Garmin sync
        env:
          MYPR_API_URL: ${{ secrets.MYPR_API_URL }}
          MYPR_API_KEY: ${{ secrets.MYPR_API_KEY }}
        run: python scripts/garmin_sync.py
